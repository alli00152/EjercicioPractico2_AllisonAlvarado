<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Formulario evento')}"></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>
<header th:replace="~{general/fragmentos :: hero('Formulario de evento', 'Registre o edite la información del evento')}"></header>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="section-box">
                <form th:action="@{/eventos/guardar}" th:object="${evento}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Fecha</label>
                            <input type="date" th:field="*{fecha}" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Capacidad máxima</label>
                            <input type="number" th:field="*{capacidad}" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Estado</label>
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" th:field="*{activo}">
                                <label class="form-check-label fw-semibold">Evento activo</label>
                            </div>
                        </div>

                        <div class="col-12">
                            <label class="form-label fw-semibold">Descripción</label>
                            <textarea th:field="*{descripcion}" class="form-control" rows="5"></textarea>
                        </div>
                    </div>

                    <div class="page-actions mt-4">
                        <button type="submit" class="btn btn-rosa rounded-pill px-4">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Guardar
                        </button>

                        <a th:href="@{/eventos}" class="btn btn-outline-rosa rounded-pill px-4">
                            <i class="fa-solid fa-arrow-left me-2"></i>Volver
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
<script th:replace="~{general/fragmentos :: scripts}"></script>
</body>
</html>
