<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Formulario evento')}" ></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>
<div class="container py-5">
    <div class="card shadow border-0">
        <div class="card-body p-4">
            <h3 class="mb-4">Formulario de evento</h3>
            <form th:action="@{/eventos/guardar}" th:object="${evento}" method="post">
                <input type="hidden" th:field="*{id}">

                <div class="mb-3">
                    <label class="form-label">Nombre</label>
                    <input type="text" th:field="*{nombre}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Descripción</label>
                    <textarea th:field="*{descripcion}" class="form-control" rows="4"></textarea>
                </div>
                 <div class="mb-3">
                    <label class="form-label">Fecha</label>
                    <input type="date" th:field="*{fecha}" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Capacidad máxima</label>
                    <input type="number" th:field="*{capacidad}" class="form-control" required>
                </div>

                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" th:field="*{activo}">
                    <label class="form-check-label">Activo</label>
                </div>

                <button type="submit" class="btn btn-rosa">Guardar</button>
                <a th:href="@{/eventos}" class="btn btn-secondary">Volver</a>
            </form>
        </div>
    </div>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
<script th:replace="~{general/fragmentos :: scripts}"></script>
</body>
</html>
