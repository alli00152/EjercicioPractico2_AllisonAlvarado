<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo}">Eventia</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">

        <a class="navbar-brand brand-wrap" th:href="@{/}">
            <span class="brand-mark">
                <i class="fa-solid fa-calendar-check"></i>
            </span>
            <span class="brand-text-wrap">
                <span class="brand-title">Eventia</span>
                <small class="brand-subtitle">Plataforma de eventos</small>
            </span>
        </a>

        <button class="navbar-toggler border-0 shadow-none" type="button"
                data-bs-toggle="collapse" data-bs-target="#menuNav"
                aria-controls="menuNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNav">

            <ul class="navbar-nav mx-auto mb-3 mb-lg-0 navbar-center-menu">
                <li class="nav-item">
                    <a class="nav-link nav-pill" th:href="@{/}">
                        <i class="fa-solid fa-house me-2"></i>Inicio
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link nav-pill" th:href="@{/usuarios}">
                        <i class="fa-solid fa-users me-2"></i>Usuarios
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link nav-pill" th:href="@{/roles}">
                        <i class="fa-solid fa-user-shield me-2"></i>Roles
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')">
                    <a class="nav-link nav-pill" th:href="@{/eventos}">
                        <i class="fa-solid fa-ticket me-2"></i>Eventos
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')">
                    <a class="nav-link nav-pill" th:href="@{/consultas}">
                        <i class="fa-solid fa-chart-line me-2"></i>Consultas
                    </a>
                </li>
            </ul>

            <div class="navbar-actions d-flex align-items-center gap-2">
                <span sec:authorize="isAuthenticated()" class="session-pill">
                    <i class="fa-solid fa-circle-check me-1"></i>En línea
                </span>

                <a sec:authorize="!isAuthenticated()"
                   class="btn btn-light btn-sm rounded-pill px-3"
                   th:href="@{/login}">
                    <i class="fa-solid fa-right-to-bracket me-1"></i>Ingresar
                </a>

                <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                    <button type="submit" class="btn btn-outline-light btn-sm rounded-pill px-3">
                        <i class="fa-solid fa-right-from-bracket me-1"></i>Salir
                    </button>
                </form>
            </div>
        </div>
    </div>
</nav>

<header th:fragment="hero(titulo, subtitulo)" class="hero-section">
    <div class="container">
        <div class="hero-shell">
            <div class="hero-content text-center">
                <h1 class="hero-title mb-2" th:text="${titulo}">Título</h1>
                <p class="hero-subtitle mb-0" th:if="${subtitulo != null and !#strings.isEmpty(subtitulo)}" th:text="${subtitulo}">Subtítulo</p>
            </div>
        </div>
    </div>
</header>

<footer th:fragment="footer" class="footer-custom">
    <div class="container py-4">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-center gap-2">
            <div>
                <p class="mb-0 fw-semibold">Eventia</p>
                <small class="text-muted">Plataforma de Reservas de Eventos</small>
            </div>
            <small class="text-muted">Proyecto de Desarrollo de Aplicaciones Web y Patrones</small>
        </div>
    </div>
</footer>

<script th:fragment="scripts" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
