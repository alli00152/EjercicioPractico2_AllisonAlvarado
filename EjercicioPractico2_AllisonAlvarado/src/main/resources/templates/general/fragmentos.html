<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo}">Plataforma de Eventos</title>
    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark barra-rosa shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" th:href="@{/}">
            <i class="fa-solid fa-calendar-days"></i> Eventia
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" th:href="@{/}">Inicio</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/usuarios}">Usuarios</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" th:href="@{/roles}">Roles</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')"><a class="nav-link" th:href="@{/eventos}">Eventos</a></li>
                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')"><a class="nav-link" th:href="@{/consultas}">Consultas</a></li>
            </ul>

            <ul class="navbar-nav">
                <li class="nav-item" sec:authorize="!isAuthenticated()">
                    <a class="nav-link" th:href="@{/login}"><i class="fa-solid fa-right-to-bracket"></i> Ingresar</a>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <span class="nav-link">Bienvenido</span>
                </li>
                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <a class="nav-link" th:href="@{/logout}"><i class="fa-solid fa-right-from-bracket"></i> Salir</a>
                </li>
            </ul>
        </div>
    </div>
</nav>
<header th:fragment="hero(titulo, subtitulo)" class="hero-principal text-center py-5 mb-4">
    <div class="container">
        <h1 class="display-5 fw-bold" th:text="${titulo}">Título</h1>
        <p class="lead mb-0" th:text="${subtitulo}">Subtítulo</p>
    </div>
</header>

<footer th:fragment="footer" class="py-4 mt-5 footer-rosa text-center">
    <div class="container">
        <p class="mb-0">Proyecto de Desarrollo de Aplicaciones Web y Patrones</p>
    </div>
</footer>

<script th:fragment="scripts" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
