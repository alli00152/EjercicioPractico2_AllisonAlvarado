<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<head th:fragment="head(titulo)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${titulo}">Eventia</title>

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold d-flex align-items-center gap-2" th:href="@{/}">
            <i class="fa-solid fa-calendar-check"></i>
            <span>Eventia</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menuNav"
                aria-controls="menuNav" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="menuNav">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/}">
                        <i class="fa-solid fa-house me-1"></i>Inicio
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/usuarios}">
                        <i class="fa-solid fa-users me-1"></i>Usuarios
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasRole('ADMIN')">
                    <a class="nav-link" th:href="@{/roles}">
                        <i class="fa-solid fa-user-shield me-1"></i>Roles
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')">
                    <a class="nav-link" th:href="@{/eventos}">
                        <i class="fa-solid fa-ticket me-1"></i>Eventos
                    </a>
                </li>

                <li class="nav-item" sec:authorize="hasAnyRole('ADMIN','ORGANIZADOR','CLIENTE')">
                    <a class="nav-link" th:href="@{/consultas}">
                        <i class="fa-solid fa-magnifying-glass me-1"></i>Consultas
                    </a>
                </li>
            </ul>

            <ul class="navbar-nav align-items-lg-center">
                <li class="nav-item me-lg-2" sec:authorize="!isAuthenticated()">
                    <a class="btn btn-light btn-sm rounded-pill px-3" th:href="@{/login}">
                        <i class="fa-solid fa-right-to-bracket me-1"></i>Ingresar
                    </a>
                </li>

                <li class="nav-item me-lg-2" sec:authorize="isAuthenticated()">
                    <span class="nav-link text-white-50">Sesión activa</span>
                </li>

                <li class="nav-item" sec:authorize="isAuthenticated()">
                    <form th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit" class="btn btn-outline-light btn-sm rounded-pill px-3">
                            <i class="fa-solid fa-right-from-bracket me-1"></i>Salir
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</nav>

<header th:fragment="hero(titulo, subtitulo)" class="hero-section py-5 mb-4">
    <div class="container">
        <div class="hero-card mx-auto text-center">
            <h1 class="fw-bold mb-2" th:text="${titulo}">Título</h1>
            <p class="text-muted mb-0" th:text="${subtitulo}">Subtítulo</p>
        </div>
    </div>
</header>

<footer th:fragment="footer" class="footer-custom mt-5">
    <div class="container py-4 text-center">
        <p class="mb-1 fw-semibold">Plataforma de Reservas de Eventos</p>
        <small class="text-muted">Proyecto de Desarrollo de Aplicaciones Web y Patrones</small>
    </div>
</footer>

<script th:fragment="scripts" th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>

</body>
</html>
