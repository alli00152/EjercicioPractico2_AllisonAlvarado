<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Roles')}" ></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>
<header th:replace="~{general/fragmentos :: hero('Gestión de roles', 'Administración completa de roles del sistema')}"></header>
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3>Listado de roles</h3>
        <a th:href="@{/roles/nuevo}" class="btn btn-rosa">Nuevo rol</a>
    </div>

    <div class="alert alert-success" th:if="${mensaje}" th:text="${mensaje}"></div>

    <div class="card shadow-sm border-0">
        <div class="card-body">
            <table class="table table-hover align-middle">
                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Acciones</th>
                </tr>
                 </thead>
                <tbody>
                <tr th:each="rol : ${roles}">
                    <td th:text="${rol.id}"></td>
                    <td th:text="${rol.nombre}"></td>
                    <td>
                        <a th:href="@{/roles/editar/{id}(id=${rol.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/roles/eliminar/{id}(id=${rol.id})}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
<footer th:replace="~{general/fragmentos :: footer}"></footer>
<script th:replace="~{general/fragmentos :: scripts}"></script>
</body>
</html>
