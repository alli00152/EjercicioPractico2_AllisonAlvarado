<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{general/fragmentos :: head('Formulario usuario')}"></head>
<body>
<nav th:replace="~{general/fragmentos :: navbar}"></nav>
<header th:replace="~{general/fragmentos :: hero('Formulario de usuario', 'Cree o edite la información del usuario')}"></header>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="section-box">
                <form th:action="@{/usuarios/guardar}" th:object="${usuario}" method="post">
                    <input type="hidden" th:field="*{id}">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Nombre</label>
                            <input type="text" th:field="*{nombre}" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Correo electrónico</label>
                            <input type="email" th:field="*{email}" class="form-control" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Contraseña</label>
                            <input type="password" th:field="*{password}" class="form-control"
                                   placeholder="Digite la contraseña">
                        </div>

                        <div class="col-md-6">
                            <label class="form-label fw-semibold">Rol</label>
                            <select name="rol.id" class="form-select" required>
                                <option value="">Seleccione un rol</option>
                                <option th:each="rol : ${roles}"
                                        th:value="${rol.id}"
                                        th:text="${rol.nombre}"
                                        th:selected="${usuario.rol != null and usuario.rol.id == rol.id}">
                                </option>
                            </select>
                        </div>

                        <div class="col-12">
                            <div class="form-check mt-2">
                                <input class="form-check-input" type="checkbox" th:field="*{activo}">
                                <label class="form-check-label fw-semibold">Usuario activo</label>
                            </div>
                        </div>
                    </div>

                    <div class="page-actions mt-4">
                        <button type="submit" class="btn btn-rosa rounded-pill px-4">
                            <i class="fa-solid fa-floppy-disk me-2"></i>Guardar
                        </button>

                        <a th:href="@{/usuarios}" class="btn btn-outline-rosa rounded-pill px-4">
                            <i class="fa-solid fa-arrow-left me-2"></i>Volver
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<footer th:replace="~{general/fragmentos :: footer}"></footer>
<script th:replace="~{general/fragmentos :: scripts}"></script>
</body>
</html>
